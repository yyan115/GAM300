name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
      release_name:
        description: 'Release name (e.g. Milestone 4 - Final Submission)'
        required: true

env:
  VCPKG_COMMIT: 2d6a6cf3ac9a7cc93942c3d289a2f9c661a6f4a7

jobs:
  # ── Windows Installer Build ────────────────────────────────────────
  windows-build:
    runs-on: windows-2022
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: vcpkg
        key: vcpkg-exe-${{ env.VCPKG_COMMIT }}

    - name: Cache vcpkg packages
      id: cache-vcpkg-packages
      uses: actions/cache@v4
      with:
        path: Project/Build/vcpkg_installed
        key: vcpkg-pkgs-${{ env.VCPKG_COMMIT }}-${{ hashFiles('Project/vcpkg.json') }}

    - name: Bootstrap vcpkg
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        git checkout ${{ env.VCPKG_COMMIT }}
        .\bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    - name: Install dependencies
      if: steps.cache-vcpkg-packages.outputs.cache-hit != 'true'
      run: cmake --preset release
      working-directory: Project

    - name: Configure CMake
      run: cmake --preset release
      working-directory: Project

    - name: Build
      run: cmake --build --preset release --parallel
      working-directory: Project

    - name: Stage game files for installer
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $gamedir = "Installer\GAMEDIRECTORY"
        New-Item -ItemType Directory -Force -Path $gamedir | Out-Null

        # Verify the game build exists
        if (-not (Test-Path "Project\Build\Release\Kusane.exe")) {
            Write-Error "Kusane.exe not found in Project\Build\Release — build failed?"
            Get-ChildItem Project\Build\Release -ErrorAction SilentlyContinue | Format-Table -AutoSize
            exit 1
        }

        # Copy the exe and every DLL the game needs (Engine, fmod, vcpkg DLLs)
        Copy-Item -Path "Project\Build\Release\*.exe" -Destination $gamedir -Force
        Copy-Item -Path "Project\Build\Release\*.dll" -Destination $gamedir -Force

        # Copy Resources DIRECTLY from source. POST_BUILD also copies them into
        # Build\Release\Resources, but going to source is simpler, removes the dependency
        # on POST_BUILD, and avoids xcopy quirks with large trees.
        Copy-Item -Path "Project\Resources" -Destination $gamedir -Recurse -Force

        # Verification — fail fast if something looks wrong so we catch it in CI, not in the wild.
        Write-Host "=== Staged top-level files ==="
        Get-ChildItem $gamedir -File | Select-Object Name, @{N='Size(KB)';E={[int]($_.Length/1KB)}} | Format-Table -AutoSize

        Write-Host "=== Resource subdirs ==="
        Get-ChildItem "$gamedir\Resources" -Directory | Select-Object Name | Format-Table -AutoSize

        $exeOk = Test-Path "$gamedir\Kusane.exe"
        $engineOk = Test-Path "$gamedir\Engine.dll"
        $fmodOk = Test-Path "$gamedir\fmod.dll"
        $resOk = Test-Path "$gamedir\Resources\Scenes"
        $shaderOk = Test-Path "$gamedir\Resources\Shaders"
        $modelOk = Test-Path "$gamedir\Resources\Models"
        $configOk = Test-Path "$gamedir\Resources\Configs\input_config.json"

        Write-Host "Kusane.exe:                 $exeOk"
        Write-Host "Engine.dll:                 $engineOk"
        Write-Host "fmod.dll:                   $fmodOk"
        Write-Host "Resources\Scenes:           $resOk"
        Write-Host "Resources\Shaders:          $shaderOk"
        Write-Host "Resources\Models:           $modelOk"
        Write-Host "Resources\Configs\...json:  $configOk"

        if (-not ($exeOk -and $engineOk -and $fmodOk -and $resOk -and $shaderOk -and $modelOk -and $configOk)) {
            Write-Error "Staging is missing required files — installer would produce a broken game."
            exit 1
        }

        $totalMb = [int](((Get-ChildItem $gamedir -Recurse -File | Measure-Object -Property Length -Sum).Sum) / 1MB)
        Write-Host "=== Total staged size: $totalMb MB ==="

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress
      shell: cmd

    - name: Build installer
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Installer\InstallScript.iss
      shell: cmd

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: Installer/INSTALLER/Kusane_Setup.exe
        retention-days: 1

  # ── Android APK Build ──────────────────────────────────────────────
  android-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Cache Jolt Physics (FetchContent)
      uses: actions/cache@v4
      with:
        path: Project/Build/android-release/_deps
        key: android-deps-Release-${{ hashFiles('Project/ImportDependencies.cmake') }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install NDK and Ninja
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.14033849"
        sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Build APK
      run: ./gradlew assembleRelease
      working-directory: AndroidProject

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: AndroidProject/app/build/outputs/apk/release/*.apk
        retention-days: 1

  # ── Create GitHub Release ──────────────────────────────────────────
  publish-release:
    needs: [windows-build, android-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-release
        path: release-files/

    - name: Download Android artifact
      uses: actions/download-artifact@v4
      with:
        name: android-release
        path: release-files/

    - name: Rename APK
      # Android install fails when the APK filename contains hyphens/version suffix on some
      # devices (package installer refuses to read the manifest). Strip everything to `Kusane.apk`.
      run: |
        cd release-files
        for f in *.apk; do
          mv "$f" "Kusane.apk"
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: ${{ github.event.inputs.release_name }}
        body: |
          ## ${{ github.event.inputs.release_name }}

          **Version:** `${{ github.event.inputs.version }}`

          ### Downloads
          - **Windows** — `Kusane_Setup.exe` (installer)
          - **Android** — `Kusane.apk`

          ---
          *Built automatically from `${{ github.sha }}` on `${{ github.ref_name }}`*
        files: release-files/*
        draft: false
        prerelease: false
